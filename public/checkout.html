<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | MEDAYUR</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#fefdf7;
font-family:Arial,sans-serif;
}

.checkout-box{
max-width:700px;
margin:auto;
margin-top:80px;
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 2px 12px rgba(0,0,0,.08);
}

.title{
text-align:center;
margin-bottom:30px;
color:#2e7d32;
font-weight:700;
}

.place-btn{
width:100%;
padding:15px;
border:none;
background:#2e7d32;
color:white;
border-radius:10px;
font-size:18px;
margin-top:20px;
}

</style>

</head>

<body>



<div class="checkout-box">

<h2 class="title">Checkout Details</h2>


<form id="checkoutForm">


<input
class="form-control mb-3"
placeholder="Full Name"
required>


<input
class="form-control mb-3"
placeholder="Phone Number"
required>


<input
class="form-control mb-3"
placeholder="Email Address"
required>


<textarea
class="form-control mb-3"
placeholder="Complete Address"
required></textarea>


<input
class="form-control mb-3"
placeholder="Pincode"
required>


<hr>


<h4>

Order Total:

<span id="checkout-total">

₹0

</span>

</h4>


<button class="place-btn">

Place Order

</button>


</form>

</div>



<script src="js/cart.js"></script>

<script>


/* SHOW TOTAL */

document.getElementById("checkout-total").innerHTML =
"₹" + getCartTotal();



/* PLACE ORDER */

document
.getElementById("checkoutForm")

.addEventListener("submit",function(e){

e.preventDefault();


alert("Order placed successfully");


clearCart();


window.location.href="index.html";

});

</script>

</body>
</html>

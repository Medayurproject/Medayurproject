<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MEDAYUR Admin Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>

body{
background:#f5f6fa;
font-family:Arial,sans-serif;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:250px;
height:100vh;
background:#1b5e20;
color:white;
padding:25px;
overflow:auto;
}

.sidebar h2{
font-size:24px;
font-weight:bold;
margin-bottom:30px;
text-align:center;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px;
border-radius:8px;
margin-bottom:10px;
transition:.3s;
}

.sidebar a:hover{
background:#2e7d32;
}

.main{
margin-left:270px;
padding:30px;
}

.card-box{
background:white;
border-radius:15px;
padding:25px;
box-shadow:0 3px 12px rgba(0,0,0,.08);
margin-bottom:20px;
}

.dashboard-card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.dashboard-card h2{
font-size:40px;
font-weight:bold;
color:#2e7d32;
}

.dashboard-card p{
margin:0;
font-size:18px;
}

.form-control,
.form-select{
margin-bottom:15px;
}

textarea{
resize:none;
}

.section-title{
margin-bottom:20px;
font-size:24px;
font-weight:bold;
}

.btn-success{
padding:12px;
font-size:18px;
}

.table img{
width:70px;
height:70px;
object-fit:cover;
border-radius:10px;
}

.badge{
font-size:14px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>MEDAYUR</h2>

<a href="#">
<i class="fa fa-chart-line"></i>
Dashboard
</a>

<a href="#addProduct">
<i class="fa fa-plus-circle"></i>
Add Product
</a>

<a href="#productsList">
<i class="fa fa-box"></i>
Products
</a>

<a href="#" onclick="logout()">
<i class="fa fa-sign-out-alt"></i>
Logout
</a>

</div>

<div class="main">

<h2 class="mb-4">
Admin Dashboard
</h2>

<div class="row">

<div class="col-md-4">

<div class="dashboard-card">

<h2 id="products">0</h2>

<p>Total Products</p>

</div>

</div>

<div class="col-md-4">

<div class="dashboard-card">

<h2 id="users">0</h2>

<p>Total Users</p>

</div>

</div>

<div class="col-md-4">

<div class="dashboard-card">

<h2 id="orders">0</h2>

<p>Total Orders</p>

</div>

</div>

</div>

<div class="card-box mt-4" id="addProduct">

<h3 class="section-title">

Add New Product

</h3>

<form id="productForm" enctype="multipart/form-data">

<div class="row">

<div class="col-md-6">

<input
type="text"
name="name"
class="form-control"
placeholder="Product Name"
required>

</div>

<div class="col-md-6">

<input
type="text"
name="slug"
class="form-control"
placeholder="Slug">

</div>

<div class="col-md-6">

<input
type="text"
name="category"
class="form-control"
placeholder="Category">

</div>

<div class="col-md-6">

<input
type="text"
name="brand"
class="form-control"
value="MEDAYUR">

</div>

<div class="col-md-4">

<input
type="number"
name="price"
class="form-control"
placeholder="Selling Price"
required>

</div>

<div class="col-md-4">

<input
type="number"
name="oldPrice"
class="form-control"
placeholder="Old Price">

</div>

<div class="col-md-4">

<input
type="number"
name="mrp"
class="form-control"
placeholder="MRP">

</div>

<div class="col-md-12">

<input
type="file"
name="image"
class="form-control"
required>

</div>

<div class="col-md-12">

<textarea
name="description"
class="form-control"
rows="4"
placeholder="Product Description"></textarea>

</div>

<div class="col-md-6">

<textarea
name="ingredients"
class="form-control"
rows="4"
placeholder="Ingredients (Comma Separated)
Example:
Ashwagandha,Amla,Giloy,Zinc"></textarea>

</div>

<div class="col-md-6">

<textarea
name="benefits"
class="form-control"
rows="4"
placeholder="Benefits (Comma Separated)
Example:
Boost Immunity,Increase Energy"></textarea>

</div>

<div class="col-md-6">

<textarea
name="usage"
class="form-control"
rows="3"
placeholder="Usage Instructions"></textarea>

</div>

<div class="col-md-6">

<textarea
name="information"
class="form-control"
rows="3"
placeholder="Additional Information"></textarea>

</div>

<div class="col-md-6">

<input
type="text"
name="dosage"
class="form-control"
placeholder="Dosage">

</div>

<div class="col-md-6">

<input
type="text"
name="sideEffects"
class="form-control"
placeholder="Side Effects">

</div>

<div class="col-md-6">

<input
type="text"
name="weight"
class="form-control"
placeholder="Weight (100gm / 500ml etc.)">

</div>

<div class="col-md-6">

<input
type="text"
name="quantity"
class="form-control"
placeholder="Quantity (Bottle / Pack etc.)">

</div>

<div class="col-md-4">

<input
type="number"
name="stock"
class="form-control"
placeholder="Stock"
value="100">

</div>

<div class="col-md-4">

<input
type="number"
step="0.1"
name="rating"
class="form-control"
placeholder="Rating"
value="5">

</div>

<div class="col-md-4">

<input
type="number"
name="reviews"
class="form-control"
placeholder="Reviews"
value="0">

</div>

<div class="col-md-4">

<div class="form-check">

<input
class="form-check-input"
type="checkbox"
name="featured"
value="true">

<label class="form-check-label">

Featured Product

</label>

</div>

</div>

<div class="col-md-4">

<div class="form-check">

<input
class="form-check-input"
type="checkbox"
name="bestSeller"
value="true">

<label class="form-check-label">

Best Seller

</label>

</div>

</div>

<div class="col-md-4">

<div class="form-check">

<input
class="form-check-input"
type="checkbox"
name="newArrival"
value="true">

<label class="form-check-label">

New Arrival

</label>

</div>

</div>

<div class="col-md-12 mt-4">

<button
type="submit"
class="btn btn-success w-100">

<i class="fa fa-plus-circle"></i>

Add Product

</button>

</div>

</div>

</form>

</div>

<div class="card-box mt-4" id="productsList">

<h3 class="section-title">

All Products

</h3>

<div class="mb-3">

<input
id="searchProduct"
class="form-control"
placeholder="Search Product..."
onkeyup="searchProducts()">

</div>

<div class="table-responsive">

<table class="table table-bordered table-hover align-middle">

<thead class="table-success">

<tr>

<th>Image</th>

<th>Name</th>

<th>Category</th>

<th>Price</th>

<th>Stock</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="productsTable">

<tr>

<td colspan="7" class="text-center">

Loading Products...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script src="js/admin.js"></script>

<script>

const token = localStorage.getItem("adminToken");

if(!token){

alert("Admin Login Required");

window.location="admin-login.html";

}

</script>

</body>
</html>

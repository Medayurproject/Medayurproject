<!DOCTYPE html>
<html>
<head>
  <title>MEDAYUR Admin Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background:#f5f5f5;
      padding:40px;
      font-family:Arial;
    }

    .box{
      background:white;
      padding:30px;
      border-radius:12px;
      text-align:center;
      box-shadow:0 0 10px rgba(0,0,0,.08);
      margin-bottom:20px;
    }

    h1{
      margin-bottom:40px;
    }
  </style>
</head>

<body>

<h1>MEDAYUR Admin Dashboard</h1>

<div class="row">

  <div class="col-md-4">
    <div class="box">
      <h2 id="products">0</h2>
      <p>Total Products</p>
    </div>
  </div>

  <div class="col-md-4">
    <div class="box">
      <h2 id="users">0</h2>
      <p>Total Users</p>
    </div>
  </div>

  <div class="col-md-4">
    <div class="box">
      <h2 id="orders">0</h2>
      <p>Total Orders</p>
    </div>
  </div>

</div>

<hr>

<h3>Quick Actions</h3>

<button onclick="window.location='index.html'" class="btn btn-success">
Go Website
</button>

<button onclick="loadDashboard()" class="btn btn-dark">
Refresh
</button>

<button onclick="logout()" class="btn btn-danger">
Logout
</button>

<script src="js/admin.js"></script>
<script>

const token = localStorage.getItem("adminToken");

if(!token){

  alert("Admin Login Required");

  window.location="admin-login.html";

}

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders | MEDAYUR</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f8faf7;
font-family:Arial,sans-serif;
padding:40px;
}

.header{
text-align:center;
margin-bottom:40px;
}

.header h1{
color:#2e7d32;
font-weight:700;
}

.order-card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
margin-bottom:20px;
transition:0.3s;
}

.order-card:hover{
transform:translateY(-5px);
}

.status{
display:inline-block;
padding:6px 15px;
background:#e8f5e9;
color:#2e7d32;
border-radius:20px;
font-weight:600;
}

.total{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.date{
color:gray;
font-size:14px;
}

.back-btn{
text-decoration:none;
background:#2e7d32;
color:white;
padding:12px 25px;
border-radius:30px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>📦 My Orders</h1>
<p>Track all your wellness product orders</p>

<a href="index.html" class="back-btn">
← Back To Home
</a>
</div>

<div id="orders"></div>

</div>

<script>

async function loadOrders(){

 const token = localStorage.getItem("token");

 const res = await fetch(
 "http://localhost:5000/api/orders/my-orders",{

   headers:{
     authorization: token
   }

 });

 const orders = await res.json();

 let html = "";

 if(orders.length===0){

   html = `
   <div class="text-center">
   <h3>No Orders Yet</h3>
   <p>You have not placed any order.</p>
   </div>
   `;
 }

 orders.forEach(order=>{

   html += `

   <div class="order-card">

      <div class="total">
      Order Total ₹${order.totalAmount}
      </div>

      <p>
      Status:
      <span class="status">
      ${order.status}
      </span>
      </p>

      <div class="date">
      Order Received Successfully
      </div>

   </div>

   `;
 });

 document.getElementById("orders").innerHTML = html;
}

loadOrders();

</script>

</body>
</html>

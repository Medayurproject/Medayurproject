<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shop Products | MEDAYUR</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#fefdf7;
font-family:Arial, sans-serif;
}

/* NAVBAR */

.navbar{
background:white;
box-shadow:0 2px 12px rgba(0,0,0,.08);
padding:15px 0;
position:sticky;
top:0;
z-index:999;
}

.navbar-brand img{
height:50px;
}

/* TITLE */

.page-title{
text-align:center;
font-size:42px;
font-weight:700;
margin:60px 0;
color:#2e7d32;
}

/* PRODUCT */

.product-card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
transition:.3s;
position:relative;
height:100%;
}

.product-card:hover{
transform:translateY(-8px);
}

.product-card img{
width:100%;
height:220px;
object-fit:contain;
border-radius:10px;
}

.discount{
position:absolute;
top:15px;
left:15px;
background:#2e7d32;
color:white;
padding:4px 10px;
font-size:12px;
border-radius:5px;
}

.product-card h4{
margin-top:15px;
font-size:20px;
}

.price{
font-size:22px;
font-weight:700;
color:#2e7d32;
}

.old-price{
text-decoration:line-through;
font-size:14px;
margin-left:10px;
color:#888;
}

.rating{
margin:10px 0;
color:#ff9800;
}

.cart-btn{
width:100%;
padding:12px;
border:none;
background:#2e7d32;
color:white;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

.cart-btn:hover{
background:#245f27;
}

/* CART BADGE */

.cart-link{
position:relative;
}

.cart-count{
position:absolute;
top:-8px;
right:-10px;
background:red;
color:white;
width:22px;
height:22px;
border-radius:50%;
font-size:12px;
display:flex;
align-items:center;
justify-content:center;
}

footer{
background:#111;
color:white;
padding:40px;
text-align:center;
margin-top:80px;
}

</style>

</head>

<body>



<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand" href="index.html">

<img src="images/logo.png">

</a>


<div class="collapse navbar-collapse">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="index.html">Home</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="products.html">Products</a>
</li>

<li class="nav-item cart-link">

<a class="nav-link" href="cart.html">

Cart 🛒

<span id="cart-count" class="cart-count">0</span>

</a>

</li>

</ul>

</div>

</div>

</nav>




<!-- TITLE -->

<h1 class="page-title">Shop Premium Ayurvedic Products</h1>




<!-- PRODUCTS -->

<section class="container">

<section class="container">

<div class="row g-4" id="products-list"></div>

</section>



<footer>

© 2026 MEDAYUR — Premium Ayurvedic Wellness

</footer>



<!-- CART JS -->

<script>

let allProducts = [];

async function loadProducts(){

  const res =
  await fetch("https://medayurproject.onrender.com/api/products");

  const products = await res.json();

  allProducts = products;

  showProducts(products);

}


function showProducts(products){

  let html = "";

  products.forEach(product=>{

     let discount = 0;

     if(product.oldPrice){

        discount =
        Math.round(
        ((product.oldPrice-product.price)
        /product.oldPrice)*100
        );

     }

     html += `

<div class="col-md-3">

<div class="product-card">

${discount>0 ?
`<div class="discount">${discount}% OFF</div>`
: ""}

${product.soldOut ?
`<div style="
position:absolute;
top:50px;
left:15px;
background:red;
color:white;
padding:5px 10px;
border-radius:5px">
OUT OF STOCK
</div>`
: ""}

<img src="https://medayurproject.onrender.com${product.image}">

<h4>${product.name}</h4>

<div class="rating">
${"★".repeat(product.rating || 5)}
</div>

<span class="price">
₹${product.price}
</span>

${product.oldPrice ?
`<span class="old-price">
₹${product.oldPrice}
</span>`
: ""}

<br><br>

${
product.soldOut ?

`<button disabled
style="
width:100%;
padding:12px;
background:#999;
border:none;
border-radius:10px;
color:white">
Sold Out
</button>`

:

`<button class="cart-btn"
onclick='addToCart(${JSON.stringify(product)})'>
Add To Cart
</button>`
}

</div>

</div>

`;

  });

  document.getElementById(
  "products-list").innerHTML = html;

}



function addToCart(product){

 let cart =
 JSON.parse(localStorage.getItem("cart")) || [];

 let existing =
 cart.find(item => item._id === product._id);

 if(existing){

   existing.quantity += 1;

 } else {

   cart.push({

      _id: product._id,
      name: product.name,
      price: product.price,
      image: "https://medayurproject.onrender.com" + product.image,
      quantity: 1

   });

 }

 localStorage.setItem(
   "cart",
   JSON.stringify(cart)
 );

 updateCartCount();

 alert("Added To Cart");
}



function updateCartCount(){

 let cart =
 JSON.parse(
 localStorage.getItem("cart")
 ) || [];

 let totalQty = 0;

 cart.forEach(item=>{

    totalQty += item.quantity;

 });

 document.getElementById(
 "cart-count"
 ).innerText = totalQty;

}



loadProducts();
updateCartCount();

</script>

</body>
</html>

</body>
</html>

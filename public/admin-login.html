<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="padding:50px; max-width:500px; margin:auto;">

<h2>MEDAYUR Admin Login</h2>

<input id="username" class="form-control" placeholder="Admin Username">
<br>

<input id="password" type="password" class="form-control" placeholder="Password">
<br>

<button onclick="adminLogin()" class="btn btn-dark">
Login
</button>

<script>

function adminLogin(){

 const username = document.getElementById("username").value;

 const password = document.getElementById("password").value;

 if(username === "admin" && password === "medayur123"){

    localStorage.setItem("adminToken","loggedin");

    alert("Login Success");

    window.location = "admin.html";

 }

 else{

   alert("Wrong Credentials");

 }

}

</script>

</body>
</html>
